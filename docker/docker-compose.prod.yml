# Production Docker Compose - Backend + Redis
#
# MongoDB (Atlas) is external. Supabase Auth is a hosted service.
# Expose backend (3001) via Cloudflare Tunnel to the internet.
#
# Usage:
#   cd bill-pro-max-backend-v2/docker
#   cp ../.env.production.example ../.env.production  # first time
#   docker compose -f docker-compose.prod.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: billpromax-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed - internal only

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: billpromax-backend
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - billpromax-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  billpromax-network:
    driver: bridge

volumes:
  redis_data:
  backend_uploads:
