# Local Development Docker Compose
#
# Runs MongoDB and Redis. Backend runs via `npm run dev`. Keycloak uses remote/prod.
#
# Usage:
#   cd bill-pro-max-backend-v2/docker
#   docker compose up -d
#
#   # Then (from bill-pro-max-backend-v2/):
#   npm run dev
#
# Ports:
#   - MongoDB: localhost:27017
#   - Redis:   localhost:6379
#
# Backend .env (remote Keycloak; local MongoDB, Redis):
#   MONGODB_URI=mongodb://billpromax:password@localhost:27017/billpromax?authSource=admin
#   REDIS_URL=redis://localhost:6379
#   KEYCLOAK_URL=https://chat-largest-compilation-screensaver.trycloudflare.com
#   JWT_ISSUER=https://chat-largest-compilation-screensaver.trycloudflare.com/realms/billpromax

services:
  mongodb:
    image: mongo:7.0
    container_name: billpromax-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: billpromax
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: billpromax
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: billpromax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  billpromax-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
