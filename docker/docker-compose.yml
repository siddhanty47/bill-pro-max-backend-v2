version: '3.8'

services:
  # MongoDB for application data
  mongodb:
    image: mongo:7.0
    container_name: billpromax-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: billpromax
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: billpromax
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis for Bull queues and caching
  redis:
    image: redis:7-alpine
    container_name: billpromax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Keycloak
  keycloak-db:
    image: postgres:15-alpine
    container_name: billpromax-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak for authentication
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: billpromax-keycloak
    command: start-dev --import-realm
    environment:
      # Database settings
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Hostname settings
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Feature settings
      KC_FEATURES: token-exchange
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    networks:
      - billpromax-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  billpromax-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  keycloak_db_data:
